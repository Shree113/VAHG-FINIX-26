<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LOS REYES '26 | JCT CSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* ===== RESET & VARIABLES ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #ff8c00;
      --orange-bright: #ffa500;
      --orange-glow: rgba(255,140,0,0.35);
      --bg-dark: #0a0a08;
      --bg-card: #111109;
      --border-orange: rgba(255,140,0,0.3);
      --text-primary: #f0e8d0;
      --text-secondary: #a09070;
      --text-muted: #554f3a;
      --font-display: 'Orbitron', sans-serif;
      --font-body: 'Exo 2', sans-serif;
      --font-mono: 'Share Tech Mono', monospace;
    }
    html { scroll-behavior: smooth; }
    body {
      background-color: var(--bg-dark);
      color: var(--text-primary);
      font-family: var(--font-body);
      overflow-x: hidden;
      background-image:
        radial-gradient(ellipse 80% 40% at 50% 0%, rgba(255,140,0,0.06) 0%, transparent 70%),
        repeating-linear-gradient(0deg, transparent, transparent 60px, rgba(255,140,0,0.013) 60px, rgba(255,140,0,0.013) 61px),
        repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(255,140,0,0.013) 60px, rgba(255,140,0,0.013) 61px);
    }
    a { text-decoration: none; color: inherit; }
    button { cursor: pointer; font-family: var(--font-display); border: none; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: #cc6f00; border-radius: 3px; }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes titleReveal {
      from { opacity: 0; letter-spacing: 0.4em; filter: blur(8px); }
      to { opacity: 1; letter-spacing: 0.05em; filter: blur(0); }
    }
    @keyframes flicker {
      0%, 94%, 100% { opacity: 1; }
      95% { opacity: 0.8; }
      97% { opacity: 1; }
      99% { opacity: 0.85; }
    }
    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes scan {
      from { transform: translateY(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      to { transform: translateY(100vh); opacity: 0; }
    }
    @keyframes particleFloat {
      from { transform: translateY(0) scale(1); opacity: 0.2; }
      to { transform: translateY(-20px) scale(1.5); opacity: 0.6; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 12px rgba(255,140,0,0.3); }
      50% { box-shadow: 0 0 25px rgba(255,140,0,0.6); }
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 48px;
      background: rgba(10,10,8,0.3);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,140,0,0.08);
      transition: all 0.3s ease;
    }
    .navbar.scrolled {
      background: rgba(10,10,8,0.92);
      border-bottom-color: rgba(255,140,0,0.25);
      box-shadow: 0 4px 30px rgba(255,140,0,0.08);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo-icon { animation: rotateSlow 12s linear infinite; }
    .nav-logo-text {
      font-family: var(--font-display); font-size: 1rem; font-weight: 700;
      color: var(--orange); letter-spacing: 0.15em;
      text-shadow: 0 0 10px rgba(255,140,0,0.5);
    }
    .nav-logo-year {
      font-family: var(--font-display); font-size: 0.8rem;
      color: var(--text-primary); opacity: 0.6;
    }
    .nav-links { display: flex; list-style: none; gap: 36px; align-items: center; }
    .nav-link {
      background: none; border: none;
      font-family: var(--font-display); font-size: 0.72rem; font-weight: 600;
      color: #a09070; letter-spacing: 0.2em;
      padding: 4px 0; position: relative;
      transition: color 0.2s; display: flex; flex-direction: column; gap: 4px; align-items: center;
    }
    .nav-link:hover, .nav-link.active { color: var(--orange); text-shadow: 0 0 12px rgba(255,140,0,0.5); }
    .nav-underline {
      display: block; height: 1px; width: 0;
      background: var(--orange); transition: width 0.3s;
      box-shadow: 0 0 6px rgba(255,140,0,0.8);
    }
    .nav-link:hover .nav-underline, .nav-link.active .nav-underline { width: 100%; }

    /* ===== HERO ===== */
    .hero {
      position: relative; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; padding: 100px 24px 60px;
      background:
        radial-gradient(ellipse 60% 60% at 50% 50%, rgba(255,140,0,0.07) 0%, transparent 70%),
        radial-gradient(ellipse 100% 50% at 50% 0%, rgba(255,140,0,0.03) 0%, transparent 60%);
    }
    .scan-line {
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,140,0,0.25), transparent);
      animation: scan 8s linear infinite; pointer-events: none;
    }
    .decor-ring {
      position: absolute; border-radius: 50%;
      border: 1px solid rgba(255,140,0,0.04); pointer-events: none;
    }
    .decor-ring-1 { width: 700px; height: 700px; animation: rotateSlow 30s linear infinite; }
    .decor-ring-2 { width: 450px; height: 450px; animation: rotateSlow 20s linear infinite reverse; }
    .hero-content {
      position: relative; z-index: 2;
      text-align: center; display: flex; flex-direction: column; align-items: center; gap: 18px;
      animation: fadeInUp 1s ease forwards;
    }
    .college-badge { display: flex; align-items: center; gap: 12px; }
    .college-short {
      font-family: var(--font-display); font-size: 1.8rem; font-weight: 900;
      color: var(--orange); text-shadow: 0 0 20px rgba(255,140,0,0.7); letter-spacing: 0.1em;
    }
    .college-sep { display: block; width: 1px; height: 28px; background: rgba(255,140,0,0.3); }
    .college-full {
      font-family: var(--font-display); font-size: 0.65rem; font-weight: 600;
      color: var(--text-primary); letter-spacing: 0.18em; text-align: left; max-width: 260px; line-height: 1.6;
    }
    .dept-name {
      font-family: var(--font-body); font-size: 0.72rem; font-weight: 600;
      color: #a09070; letter-spacing: 0.28em; text-transform: uppercase;
    }
    .presents-row { display: flex; align-items: center; gap: 20px; width: 100%; max-width: 380px; }
    .pres-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(255,140,0,0.35), transparent); }
    .pres-text { font-family: var(--font-display); font-size: 0.62rem; letter-spacing: 0.4em; color: #a09070; }
    .title-wrapper {
      position: relative; padding: 28px 56px; margin: 4px 0;
    }
    .title-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,140,0,0.07), transparent 70%);
      border: 1px solid rgba(255,140,0,0.2); border-radius: 4px;
    }
    .corner { position: absolute; width: 16px; height: 16px; }
    .corner-tl { top: -2px; left: -2px; border-top: 2px solid var(--orange); border-left: 2px solid var(--orange); }
    .corner-tr { top: -2px; right: -2px; border-top: 2px solid var(--orange); border-right: 2px solid var(--orange); }
    .corner-bl { bottom: -2px; left: -2px; border-bottom: 2px solid var(--orange); border-left: 2px solid var(--orange); }
    .corner-br { bottom: -2px; right: -2px; border-bottom: 2px solid var(--orange); border-right: 2px solid var(--orange); }
    .main-title {
      font-family: var(--font-display);
      font-size: clamp(2.2rem, 6.5vw, 4.5rem); font-weight: 900;
      color: var(--orange); letter-spacing: 0.05em;
      text-shadow: 0 0 20px rgba(255,140,0,0.8), 0 0 60px rgba(255,140,0,0.25);
      animation: titleReveal 1.2s 0.5s both, flicker 8s 2s infinite;
      position: relative; z-index: 1; line-height: 1.1;
    }
    .title-year { color: var(--text-primary); font-size: 0.7em; opacity: 0.75; }
    .symp-label { display: flex; align-items: center; gap: 14px; }
    .symp-line { flex: 1; max-width: 70px; height: 1px; }
    .symp-line-l { background: linear-gradient(90deg, transparent, rgba(255,140,0,0.45)); }
    .symp-line-r { background: linear-gradient(90deg, rgba(255,140,0,0.45), transparent); }
    .symp-text {
      font-family: var(--font-body); font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.22em; color: #c8b090;
    }
    .date-box {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 22px;
      border: 1px solid rgba(255,140,0,0.18); border-radius: 4px;
      background: rgba(255,140,0,0.04);
    }
    .date-text { font-family: var(--font-mono); font-size: 0.95rem; color: var(--orange); letter-spacing: 0.2em; }
    .invite-text {
      font-family: var(--font-display); font-size: 0.85rem;
      letter-spacing: 0.4em; color: #c8b090;
    }
    .hero-cta { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
    .btn-primary {
      display: flex; align-items: center; gap: 8px;
      padding: 13px 30px; background: var(--orange);
      color: #0a0a08; border: none;
      font-family: var(--font-display); font-size: 0.68rem; font-weight: 700; letter-spacing: 0.15em;
      border-radius: 5px; transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(255,140,0,0.35);
    }
    .btn-primary:hover { background: var(--orange-bright); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,140,0,0.55); }
    .btn-secondary {
      padding: 13px 30px; background: transparent; color: var(--orange);
      border: 1px solid rgba(255,140,0,0.4);
      font-family: var(--font-display); font-size: 0.68rem; font-weight: 600; letter-spacing: 0.15em;
      border-radius: 5px; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--orange); background: rgba(255,140,0,0.07); box-shadow: 0 0 20px rgba(255,140,0,0.12); }

    /* ===== EVENTS SECTION ===== */
    .events-section {
      max-width: 1100px; margin: 0 auto; padding: 70px 40px 60px;
    }
    .day-badge {
      display: flex; align-items: center; gap: 20px;
      margin-bottom: 48px; padding-bottom: 18px;
      border-bottom: 1px solid rgba(255,140,0,0.12);
      position: relative;
    }
    .day-badge::after {
      content: ''; position: absolute; bottom: -1px; left: 0;
      width: 110px; height: 1px; background: var(--orange);
      box-shadow: 0 0 10px rgba(255,140,0,0.6);
    }
    .day-label {
      font-family: var(--font-display); font-size: 1.7rem; font-weight: 900;
      color: var(--text-primary); letter-spacing: 0.1em;
    }
    .day-date {
      font-family: var(--font-mono); font-size: 0.75rem; color: #a09070;
      letter-spacing: 0.2em; padding: 3px 10px;
      border: 1px solid rgba(255,140,0,0.18); border-radius: 3px;
    }
    .category { margin-bottom: 48px; }
    .cat-divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(255,140,0,0.18), transparent); margin: 16px 0 48px; }

    .section-title-row { display: flex; align-items: center; gap: 22px; margin-bottom: 32px; }
    .sec-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(255,140,0,0.25), transparent); }
    .sec-line-r { background: linear-gradient(90deg, transparent, rgba(255,140,0,0.25)); }
    .sec-title-text {
      font-family: var(--font-display); font-size: 1.2rem; font-weight: 800;
      color: var(--orange); letter-spacing: 0.2em; text-align: center; flex-shrink: 0;
      text-shadow: 0 0 18px rgba(255,140,0,0.35);
    }

    /* Events grid */
    .events-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 18px;
    }
    .events-grid-2 {
      display: grid; grid-template-columns: repeat(2, minmax(260px, 360px)); gap: 18px; justify-content: center;
    }

    /* Event card */
    .event-card {
      position: relative;
      background: linear-gradient(135deg, #111109, #141310);
      border: 1px solid rgba(255,140,0,0.18);
      border-radius: 8px; padding: 22px;
      display: flex; flex-direction: column; gap: 12px;
      transition: all 0.3s; overflow: hidden;
      animation: fadeInUp 0.6s both;
    }
    .event-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      opacity: 0; transition: opacity 0.3s;
    }
    .event-card:hover { border-color: rgba(255,140,0,0.45); transform: translateY(-4px); box-shadow: 0 12px 40px rgba(255,140,0,0.1); }
    .event-card:hover::before { opacity: 1; }
    .card-glow {
      position: absolute; top: -40px; right: -40px; width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(255,140,0,0.07), transparent 70%);
      border-radius: 50%; pointer-events: none;
    }
    .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .event-name {
      font-family: var(--font-display); font-size: 0.85rem; font-weight: 700;
      color: var(--orange); letter-spacing: 0.1em; line-height: 1.3;
      text-shadow: 0 0 10px rgba(255,140,0,0.35);
    }
    .team-size {
      display: flex; align-items: center; gap: 5px; flex-shrink: 0;
      background: rgba(255,140,0,0.07); border: 1px solid rgba(255,140,0,0.18);
      border-radius: 4px; padding: 3px 8px;
    }
    .team-size span {
      font-family: var(--font-mono); font-size: 0.65rem; color: var(--orange);
    }
    .team-div { color: rgba(255,140,0,0.35) !important; }
    .event-desc {
      font-family: var(--font-body); font-size: 0.76rem; color: #6a6050; line-height: 1.6;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-actions { display: flex; gap: 9px; margin-top: 4px; }
    .btn-register {
      flex: 1; padding: 9px 14px; background: var(--orange);
      color: #0a0a08; border: none;
      font-family: var(--font-display); font-size: 0.62rem; font-weight: 700; letter-spacing: 0.15em;
      border-radius: 4px; transition: all 0.2s; box-shadow: 0 2px 12px rgba(255,140,0,0.28);
    }
    .btn-register:hover { background: var(--orange-bright); box-shadow: 0 4px 20px rgba(255,140,0,0.48); transform: scale(1.02); }
    .btn-register.done { background: rgba(255,140,0,0.12); color: var(--orange); border: 1px solid rgba(255,140,0,0.35); box-shadow: none; }
    .btn-details {
      padding: 9px 12px; background: transparent; color: #a09070;
      border: 1px solid rgba(255,140,0,0.18);
      font-family: var(--font-display); font-size: 0.57rem; letter-spacing: 0.1em;
      border-radius: 4px; transition: all 0.2s; white-space: nowrap;
    }
    .btn-details:hover { color: var(--orange); border-color: rgba(255,140,0,0.38); background: rgba(255,140,0,0.04); }
    .details-panel {
      border-top: 1px solid rgba(255,140,0,0.12);
      padding-top: 14px; animation: slideDown 0.3s ease;
    }
    .details-panel h4 {
      font-family: var(--font-display); font-size: 0.65rem; color: var(--orange);
      letter-spacing: 0.2em; margin-bottom: 8px;
    }
    .details-panel p { font-family: var(--font-body); font-size: 0.76rem; color: #a09070; line-height: 1.7; }
    .rules-list { list-style: none; margin-top: 10px; display: flex; flex-direction: column; gap: 5px; }
    .rules-list li {
      font-family: var(--font-body); font-size: 0.72rem; color: #a09070;
      padding-left: 14px; position: relative;
    }
    .rules-list li::before { content: '▸'; position: absolute; left: 0; color: var(--orange); }

    /* Webinar */
    .webinar-card {
      position: relative; max-width: 640px; margin: 0 auto;
      background: linear-gradient(135deg, #0e0e0c, #111109);
      border: 1px solid rgba(255,140,0,0.22); border-radius: 12px;
      overflow: hidden; animation: fadeInUp 0.6s both;
    }
    .webinar-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
    }
    .webinar-img {
      height: 200px; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a15, #141410);
      border-bottom: 1px solid rgba(255,140,0,0.12);
      flex-direction: column; gap: 12px; opacity: 0.6;
    }
    .webinar-img span {
      font-family: var(--font-mono); font-size: 0.72rem; color: #a09070; letter-spacing: 0.3em;
    }
    .webinar-body { padding: 26px 30px 30px; display: flex; flex-direction: column; gap: 14px; }
    .webinar-name {
      font-family: var(--font-display); font-size: 0.95rem; font-weight: 700;
      color: var(--orange); letter-spacing: 0.1em; text-shadow: 0 0 12px rgba(255,140,0,0.35);
    }
    .webinar-desc { font-family: var(--font-body); font-size: 0.8rem; color: #6a6050; line-height: 1.7; }
    .btn-webinar {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 26px; background: var(--orange); color: #0a0a08; border: none;
      font-family: var(--font-display); font-size: 0.67rem; font-weight: 700; letter-spacing: 0.15em;
      border-radius: 4px; transition: all 0.2s; box-shadow: 0 4px 18px rgba(255,140,0,0.3);
    }
    .btn-webinar:hover { background: var(--orange-bright); transform: translateY(-2px); box-shadow: 0 6px 28px rgba(255,140,0,0.5); }

    /* ===== FOOTER ===== */
    .site-footer {
      border-top: 1px solid rgba(255,140,0,0.12); margin-top: 70px;
      padding: 56px 0 0; position: relative; overflow: hidden;
    }
    .footer-glow {
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 600px; height: 200px;
      background: radial-gradient(ellipse at top, rgba(255,140,0,0.05), transparent 70%);
      pointer-events: none;
    }
    .footer-inner { max-width: 1100px; margin: 0 auto; padding: 0 40px 40px; display: flex; flex-direction: column; gap: 44px; }

    /* Coord boxes */
    .top-coords {
      display: flex; background: linear-gradient(135deg, #0e0e0c, #111109);
      border: 1px solid rgba(255,140,0,0.15); border-radius: 10px; overflow: hidden;
    }
    .coord-group {
      flex: 1; padding: 24px; display: flex; flex-direction: column;
      gap: 14px; align-items: center; text-align: center;
    }
    .coord-sep { width: 1px; background: rgba(255,140,0,0.08); align-self: stretch; }
    .coord-title {
      font-family: var(--font-display); font-size: 0.62rem; font-weight: 700;
      color: var(--orange); letter-spacing: 0.25em;
    }
    .coord-cards { display: flex; flex-wrap: wrap; gap: 9px; justify-content: center; }
    .person-card {
      display: flex; align-items: center; gap: 9px;
      padding: 9px 14px;
      background: rgba(255,140,0,0.04); border: 1px solid rgba(255,140,0,0.1);
      border-radius: 6px; transition: all 0.2s;
    }
    .person-card:hover { border-color: rgba(255,140,0,0.28); background: rgba(255,140,0,0.06); }
    .p-avatar { opacity: 0.65; flex-shrink: 0; }
    .p-info { display: flex; flex-direction: column; gap: 2px; }
    .p-name { font-family: var(--font-display); font-size: 0.67rem; font-weight: 600; color: var(--text-primary); letter-spacing: 0.1em; }
    .p-role { font-family: var(--font-body); font-size: 0.6rem; color: var(--text-muted); }

    .student-coords {
      background: linear-gradient(135deg, #0e0e0c, #111109);
      border: 1px solid rgba(255,140,0,0.15); border-radius: 10px;
      padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 18px;
    }
    .student-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }

    /* Reg section */
    .reg-section {
      background: linear-gradient(135deg, #0e0e0c, #111109);
      border: 1px solid rgba(255,140,0,0.15); border-radius: 10px; overflow: hidden;
    }
    .reg-title {
      font-family: var(--font-display); font-size: 0.67rem; font-weight: 700;
      color: var(--orange); letter-spacing: 0.25em;
      padding: 16px 26px; border-bottom: 1px solid rgba(255,140,0,0.08);
      background: rgba(255,140,0,0.02);
    }
    .reg-body { padding: 22px 26px; display: flex; flex-direction: column; gap: 18px; }
    .reg-note { display: flex; align-items: center; gap: 8px; }
    .reg-note-label { font-family: var(--font-display); font-size: 0.62rem; color: var(--orange); letter-spacing: 0.25em; }
    .reg-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
    .reg-item {
      display: flex; flex-direction: column; gap: 3px;
      padding: 10px 14px; background: rgba(255,140,0,0.03);
      border: 1px solid rgba(255,140,0,0.08); border-radius: 6px;
    }
    .reg-lbl { font-family: var(--font-body); font-size: 0.6rem; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
    .reg-val { font-family: var(--font-mono); font-size: 0.76rem; color: #c8b090; }
    .note-form { display: flex; gap: 10px; align-items: flex-end; }
    .note-input {
      flex: 1; background: rgba(255,140,0,0.04); border: 1px solid rgba(255,140,0,0.18);
      border-radius: 6px; padding: 10px 14px; color: var(--text-primary);
      font-family: var(--font-body); font-size: 0.8rem; resize: none; outline: none;
      transition: border-color 0.2s;
    }
    .note-input::placeholder { color: #2a2820; }
    .note-input:focus { border-color: rgba(255,140,0,0.35); }
    .note-submit {
      padding: 10px 20px; background: rgba(255,140,0,0.09); color: var(--orange);
      border: 1px solid rgba(255,140,0,0.28);
      font-family: var(--font-display); font-size: 0.62rem; letter-spacing: 0.1em;
      border-radius: 6px; transition: all 0.2s; white-space: nowrap; height: fit-content;
    }
    .note-submit:hover { background: rgba(255,140,0,0.14); border-color: rgba(255,140,0,0.45); }

    /* Footer bottom */
    .footer-bottom {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 26px; border-top: 1px solid rgba(255,140,0,0.08);
      flex-wrap: wrap; gap: 20px;
    }
    .f-logo { display: flex; align-items: center; gap: 12px; }
    .f-logo-text { display: flex; flex-direction: column; gap: 2px; }
    .f-event { font-family: var(--font-display); font-size: 0.85rem; font-weight: 700; color: var(--orange); letter-spacing: 0.1em; }
    .f-org { font-family: var(--font-body); font-size: 0.67rem; color: #a09070; letter-spacing: 0.07em; }
    .f-dept { font-family: var(--font-body); font-size: 0.62rem; color: var(--text-muted); }
    .f-copy { font-family: var(--font-mono); font-size: 0.6rem; color: #2e2a1e; line-height: 1.9; text-align: right; }

    /* responsive */
    @media (max-width: 700px) {
      .navbar { padding: 12px 20px; }
      .nav-links { gap: 20px; }
      .events-section { padding: 60px 20px 40px; }
      .events-grid-2 { grid-template-columns: 1fr; }
      .top-coords { flex-direction: column; }
      .coord-sep { width: 100%; height: 1px; }
      .footer-inner { padding: 0 20px 30px; }
      .footer-bottom { flex-direction: column; align-items: flex-start; }
      .f-copy { text-align: left; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ===== DATA ===== */
    const eventsData = {
      day1: {
        technical: [
          {
            id: 'paper', name: 'PAPER PRESENTATION', min: 2, max: 4,
            description: 'Present your research and innovative ideas in front of a panel of experts. Showcase your technical knowledge through well-structured papers on cutting-edge topics.',
            details: 'Teams of 2–4 members present original research papers. Each team gets 10 minutes to present followed by a 5-minute Q&A session.',
            rules: ['Paper must be original and not published elsewhere', 'Duration: 10 min presentation + 5 min Q&A', 'Hard copy and soft copy required', 'Topics must be related to CS/IT domains']
          },
          {
            id: 'quiz', name: 'TECHNICAL QUIZ', max: 1,
            description: 'Test your technical acumen with a multi-round quiz covering core CS concepts, programming paradigms, algorithms, and current technology trends.',
            details: 'A fast-paced individual quiz with multiple rounds including Written, Buzzer, and Rapid Fire rounds.',
            rules: ['Individual participation only', 'Three rounds: Written, Buzzer, Rapid Fire', 'No electronic devices allowed', 'Decision of quizmaster is final']
          },
          {
            id: 'debug', name: 'CODE DEBUGGING', max: 1,
            description: 'Race against time to identify and fix bugs in complex code snippets. Test your debugging skills across multiple programming languages.',
            details: 'Participants receive buggy code and must identify and fix all errors within the time limit.',
            rules: ['Individual participation', 'Languages: C, C++, Java, Python', 'Time limit: 60 minutes', 'Partial marks for partial solutions']
          },
          {
            id: 'vibe', name: 'VIBE CODING', min: 1, max: 2,
            description: 'An exciting coding challenge where creativity meets logic. Build innovative solutions to real-world problems using your programming skills and AI tools.',
            details: 'Teams use AI tools to build a working application from a given problem statement within a limited time.',
            rules: ['Teams of 1–2 members', 'Problem statement revealed at start', 'Duration: 90 minutes', 'Any programming language allowed']
          }
        ],
        nonTechnical: [
          {
            id: 'rhythm', name: 'RHYTHM BLAST', max: 1,
            description: 'Unleash your inner performer in this energetic music and rhythm competition. Showcase your talent and celebrate creativity and artistry.',
            details: 'A solo performance event where participants showcase their musical or dance talent.',
            rules: ['Individual performance', 'Duration: 3–5 minutes per participant', 'Props and backing tracks allowed', 'Performance must be original or credited']
          },
          {
            id: 'lie', name: 'SPOT THE LIE', max: 1,
            description: 'A fun game of deception and deduction. Can you tell fact from fiction? Test your analytical skills and social intelligence.',
            details: '2 truths and 1 lie — other participants must identify the lie through questioning.',
            rules: ['Individual participation', 'Each round has 3 participants', 'Questioning time: 2 minutes', 'Points for both deception and detection']
          }
        ]
      }
    };

    /* ===== COMPONENTS ===== */

    // Navbar
    function Navbar({ active, onNav }) {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 50);
        window.addEventListener('scroll', h, { passive: true });
        return () => window.removeEventListener('scroll', h);
      }, []);
      return (
        <nav className={`navbar${scrolled ? ' scrolled' : ''}`}>
          <div className="nav-logo">
            <div className="nav-logo-icon">
              <svg viewBox="0 0 40 40" width="32" height="32">
                <polygon points="20,2 38,35 2,35" fill="none" stroke="#ff8c00" strokeWidth="2"/>
                <polygon points="20,10 32,30 8,30" fill="rgba(255,140,0,0.12)" stroke="#ff8c00" strokeWidth="1"/>
                <circle cx="20" cy="22" r="3.5" fill="#ff8c00"/>
              </svg>
            </div>
            <span className="nav-logo-text">LOS REYES</span>
            <span className="nav-logo-year">'26</span>
          </div>
          <ul className="nav-links">
            {['home','events','footer'].map(s => (
              <li key={s}>
                <button className={`nav-link${active===s?' active':''}`} onClick={() => onNav(s)}>
                  <span>{s.toUpperCase()}</span>
                  <span className="nav-underline"></span>
                </button>
              </li>
            ))}
          </ul>
        </nav>
      );
    }

    // Hero
    function Hero() {
      return (
        <section className="hero" id="home">
          <div className="scan-line"></div>
          <div className="decor-ring decor-ring-1"></div>
          <div className="decor-ring decor-ring-2"></div>
          <div className="hero-content">
            <div className="college-badge">
              <span className="college-short">JCT</span>
              <span className="college-sep"></span>
              <span className="college-full">COLLEGE OF ENGINEERING AND TECHNOLOGY</span>
            </div>
            <div className="dept-name">DEPARTMENT OF COMPUTER SCIENCE AND ENGINEERING</div>
            <div className="presents-row">
              <span className="pres-line"></span>
              <span className="pres-text">PRESENTS</span>
              <span className="pres-line"></span>
            </div>
            <div className="title-wrapper">
              <div className="title-bg"></div>
              <div className="corner corner-tl"></div>
              <div className="corner corner-tr"></div>
              <div className="corner corner-bl"></div>
              <div className="corner corner-br"></div>
              <h1 className="main-title">LOS REYES <span className="title-year">'26</span></h1>
            </div>
            <div className="symp-label">
              <span className="symp-line symp-line-l"></span>
              <span className="symp-text">NATIONAL LEVEL TECHNICAL SYMPOSIUM</span>
              <span className="symp-line symp-line-r"></span>
            </div>
            <div className="date-box">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <rect x="1" y="3" width="14" height="12" rx="1" stroke="#ff8c00" strokeWidth="1.2"/>
                <line x1="1" y1="6" x2="15" y2="6" stroke="#ff8c00" strokeWidth="1.2"/>
                <line x1="5" y1="1" x2="5" y2="5" stroke="#ff8c00" strokeWidth="1.5"/>
                <line x1="11" y1="1" x2="11" y2="5" stroke="#ff8c00" strokeWidth="1.5"/>
              </svg>
              <span className="date-text">MARCH 7 &amp; 8, 2026</span>
            </div>
            <p className="invite-text">INVITES YOU ALL</p>
            <div className="hero-cta">
              <button className="btn-primary" onClick={() => document.getElementById('events').scrollIntoView({behavior:'smooth'})}>
                EXPLORE EVENTS
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M2 7h10M8 3l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                </svg>
              </button>
              <button className="btn-secondary" onClick={() => document.getElementById('footer').scrollIntoView({behavior:'smooth'})}>
                REGISTER NOW
              </button>
            </div>
          </div>
        </section>
      );
    }

    // Event Card
    function EventCard({ event, delay }) {
      const [open, setOpen] = useState(false);
      const [reg, setReg] = useState(false);
      return (
        <div className="event-card" style={{animationDelay:`${delay}s`}}>
          <div className="card-glow"></div>
          <div className="card-header">
            <h3 className="event-name">{event.name}</h3>
            <div className="team-size">
              {event.min && <span>MIN {event.min}</span>}
              {event.min && event.max && <span className="team-div"> | </span>}
              {event.max && <span>MAX {event.max}</span>}
            </div>
          </div>
          <p className="event-desc">{event.description}</p>
          <div className="card-actions">
            <button className={`btn-register${reg?' done':''}`} onClick={() => setReg(!reg)}>
              {reg ? '✓ REGISTERED' : 'REGISTER'}
            </button>
            <button className="btn-details" onClick={() => setOpen(!open)}>
              {open ? 'HIDE ▲' : 'VIEW DETAILS ▼'}
            </button>
          </div>
          {open && (
            <div className="details-panel">
              <h4>EVENT DETAILS</h4>
              <p>{event.details}</p>
              {event.rules && (
                <ul className="rules-list">
                  {event.rules.map((r,i) => <li key={i}>{r}</li>)}
                </ul>
              )}
            </div>
          )}
        </div>
      );
    }

    // Section Title
    function SectionTitle({ children }) {
      return (
        <div className="section-title-row">
          <div className="sec-line"></div>
          <h2 className="sec-title-text">{children}</h2>
          <div className="sec-line sec-line-r"></div>
        </div>
      );
    }

    // Events
    function Events() {
      return (
        <section className="events-section" id="events">
          <div className="day-badge">
            <span className="day-label">DAY — 1</span>
            <span className="day-date">MARCH 7, 2026</span>
          </div>

          <div className="category">
            <SectionTitle>TECHNICAL EVENTS</SectionTitle>
            <div className="events-grid">
              {eventsData.day1.technical.map((e,i) => <EventCard key={e.id} event={e} delay={i*0.1}/>)}
            </div>
          </div>

          <div className="cat-divider"></div>

          <div className="category">
            <SectionTitle>NON-TECHNICAL EVENTS</SectionTitle>
            <div className="events-grid-2">
              {eventsData.day1.nonTechnical.map((e,i) => <EventCard key={e.id} event={e} delay={i*0.1}/>)}
            </div>
          </div>

          <div className="day-badge" style={{marginTop:'60px'}}>
            <span className="day-label">DAY — 2</span>
            <span className="day-date">MARCH 8, 2026</span>
          </div>

          <div className="category">
            <SectionTitle>WEBINAR</SectionTitle>
            <div className="webinar-card">
              <div className="webinar-img">
                <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                  <rect x="4" y="8" width="40" height="30" rx="2" stroke="#ff8c00" strokeWidth="1.5"/>
                  <polygon points="20,18 20,30 32,24" fill="rgba(255,140,0,0.55)"/>
                  <line x1="16" y1="42" x2="32" y2="42" stroke="#ff8c00" strokeWidth="1.5"/>
                  <line x1="24" y1="38" x2="24" y2="42" stroke="#ff8c00" strokeWidth="1.5"/>
                </svg>
                <span>WEBINAR PREVIEW</span>
              </div>
              <div className="webinar-body">
                <h3 className="webinar-name">CAREER AI NEXUS '26</h3>
                <p className="webinar-desc">
                  An exclusive webinar exploring the intersection of artificial intelligence and career development.
                  Industry experts share insights on emerging AI trends, career pathways in tech, and how to leverage
                  AI tools for professional growth. A must-attend for students aspiring to build careers in cutting-edge technology domains.
                </p>
                <button className="btn-webinar">
                  REGISTER FOR WEBINAR
                  <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M2 6.5h9M7 2.5l4 4-4 4" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </section>
      );
    }

    // Person Card
    function PersonCard({ name, role }) {
      return (
        <div className="person-card">
          <div className="p-avatar">
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <circle cx="14" cy="10" r="5" stroke="#ff8c00" strokeWidth="1.2"/>
              <path d="M3 25c0-6.075 4.925-11 11-11s11 4.925 11 11" stroke="#ff8c00" strokeWidth="1.2" strokeLinecap="round"/>
            </svg>
          </div>
          <div className="p-info">
            <span className="p-name">{name}</span>
            <span className="p-role">{role}</span>
          </div>
        </div>
      );
    }

    // Footer
    function Footer() {
      const [note, setNote] = useState('');
      const [sent, setSent] = useState(false);
      const submit = () => { setSent(true); setNote(''); setTimeout(() => setSent(false), 3000); };
      return (
        <footer className="site-footer" id="footer">
          <div className="footer-glow"></div>
          <div className="footer-inner">
            {/* Top coords */}
            <div className="top-coords">
              <div className="coord-group">
                <div className="coord-title">PRINCIPAL</div>
                <div className="coord-cards">
                  <PersonCard name="ASHOK" role="Principal"/>
                </div>
              </div>
              <div className="coord-sep"></div>
              <div className="coord-group">
                <div className="coord-title">HOD</div>
                <div className="coord-cards">
                  <PersonCard name="ASHOK" role="Head of Department"/>
                </div>
              </div>
              <div className="coord-sep"></div>
              <div className="coord-group">
                <div className="coord-title">STAFF COORDINATORS</div>
                <div className="coord-cards">
                  <PersonCard name="ASHOK" role="Staff Coordinator"/>
                  <PersonCard name="ASHOK" role="Staff Coordinator"/>
                  <PersonCard name="ASHOK" role="Staff Coordinator"/>
                </div>
              </div>
            </div>

            {/* Student coords */}
            <div className="student-coords">
              <div className="coord-title">STUDENT COORDINATORS</div>
              <div className="student-grid">
                {[1,2,3,4].map(i => <PersonCard key={i} name="ASHOK" role="Student Coordinator"/>)}
              </div>
            </div>

            {/* Registration */}
            <div className="reg-section">
              <div className="reg-title">REGISTRATION INFORMATION</div>
              <div className="reg-body">
                <div className="reg-note">
                  <svg width="15" height="15" viewBox="0 0 16 16" fill="none" style={{flexShrink:0}}>
                    <circle cx="8" cy="8" r="7" stroke="#ff8c00" strokeWidth="1.2"/>
                    <line x1="8" y1="7" x2="8" y2="11" stroke="#ff8c00" strokeWidth="1.5" strokeLinecap="round"/>
                    <circle cx="8" cy="5" r="0.8" fill="#ff8c00"/>
                  </svg>
                  <span className="reg-note-label">NOTE</span>
                </div>
                <div className="reg-grid">
                  {[['Registration Fee','Per Event Basis'],['Registration Mode','Online / On-Spot'],['Contact','Dept of CSE, JCT'],['Certificate','All Participants']].map(([l,v]) => (
                    <div className="reg-item" key={l}>
                      <span className="reg-lbl">{l}</span>
                      <span className="reg-val">{v}</span>
                    </div>
                  ))}
                </div>
                <div className="note-form">
                  <textarea className="note-input" rows="3" placeholder="Any queries or notes..."
                    value={note} onChange={e => setNote(e.target.value)}/>
                  <button className="note-submit" onClick={submit}>{sent ? '✓ SENT' : 'SUBMIT QUERY'}</button>
                </div>
              </div>
            </div>

            {/* Footer bottom */}
            <div className="footer-bottom">
              <div className="f-logo">
                <svg viewBox="0 0 40 40" width="26" height="26">
                  <polygon points="20,2 38,35 2,35" fill="none" stroke="#ff8c00" strokeWidth="2"/>
                  <circle cx="20" cy="22" r="3" fill="#ff8c00"/>
                </svg>
                <div className="f-logo-text">
                  <span className="f-event">LOS REYES '26</span>
                  <span className="f-org">JCT COLLEGE OF ENGINEERING AND TECHNOLOGY</span>
                  <span className="f-dept">DEPARTMENT OF COMPUTER SCIENCE AND ENGINEERING</span>
                </div>
              </div>
              <div className="f-copy">
                © 2026 LOS REYES '26 — DEPT. OF COMPUTER SCIENCE AND ENGINEERING<br/>
                JCT COLLEGE OF ENGINEERING AND TECHNOLOGY
              </div>
            </div>
          </div>
        </footer>
      );
    }

    // App
    function App() {
      const [active, setActive] = useState('home');

      useEffect(() => {
        const h = () => {
          const sections = ['home','events','footer'];
          let found = 'home';
          for (const id of sections) {
            const el = document.getElementById(id);
            if (el && el.getBoundingClientRect().top <= 120) found = id;
          }
          setActive(found);
        };
        window.addEventListener('scroll', h, { passive: true });
        return () => window.removeEventListener('scroll', h);
      }, []);

      const onNav = (s) => {
        document.getElementById(s)?.scrollIntoView({ behavior: 'smooth' });
        setActive(s);
      };

      return (
        <>
          <Navbar active={active} onNav={onNav}/>
          <main>
            <Hero/>
            <Events/>
            <Footer/>
          </main>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
